<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="Cache-Control" content="no-store">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Pramagent - Set new password</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f4f7fb; color: #111827; display: grid; place-items: center; min-height: 100vh; padding: 1rem; }
    .card { background: #ffffff; border: 1px solid #d9e2ec; border-radius: 8px; box-shadow: 0 18px 45px rgba(15, 23, 42, 0.10); width: min(440px, 100%); padding: 1.5rem; }
    .brand { display: flex; align-items: center; gap: 0.7rem; margin-bottom: 1.5rem; }
    .brand-mark { width: 38px; height: 38px; border-radius: 7px; display: grid; place-items: center; background: #0f766e; color: #ffffff; font-weight: 800; }
    h1 { font-size: 1.25rem; font-weight: 760; letter-spacing: 0; }
    .sub { color: #64748b; font-size: 0.86rem; margin-top: 0.15rem; }
    label { display: block; font-size: 0.8rem; color: #475569; margin-bottom: 0.35rem; font-weight: 650; }
    input { width: 100%; background: #ffffff; border: 1px solid #cbd5e1; color: #111827; min-height: 40px; padding: 0.52rem 0.72rem; border-radius: 6px; font-size: 0.92rem; margin-bottom: 1rem; }
    input:focus { outline: 2px solid rgba(15, 118, 110, 0.18); border-color: #0f766e; }
    button { width: 100%; background: #0f766e; color: #ffffff; border: none; min-height: 42px; border-radius: 6px; font-size: 0.95rem; font-weight: 750; cursor: pointer; margin-top: 0.25rem; }
    button:hover { background: #0f4f4a; }
    .error { background: #fee2e2; color: #991b1b; padding: 0.6rem 0.75rem; border-radius: 6px; font-size: 0.86rem; margin-bottom: 1rem; border: 1px solid #fecaca; }
    .message { background: #dcfce7; color: #166534; padding: 0.6rem 0.75rem; border-radius: 6px; font-size: 0.86rem; margin-bottom: 1rem; border: 1px solid #bbf7d0; }
    .note { color: #64748b; font-size: 0.78rem; margin-top: 1rem; line-height: 1.4; }
    a { color: #0f766e; text-decoration: none; }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
<div class="card">
  <div class="brand">
    <div class="brand-mark">P</div>
    <div>
      <h1>Set new password</h1>
      <div class="sub">Complete your Pramagent reset</div>
    </div>
  </div>
  {% if error %}
  <div class="error">{{ error }}</div>
  {% endif %}
  {% if message %}
  <div class="message">{{ message }}</div>
  {% endif %}
  {% if not message %}
  <form method="post" action="/reset-password" autocomplete="on">
    <input name="token" type="hidden" value="{{ token }}">
    <label for="password">New password</label>
    <input id="password" name="password" type="password" autocomplete="new-password" minlength="8" required>
    <button type="submit">Update password</button>
  </form>
  {% endif %}
  <div class="note"><a href="/login">Back to sign in</a></div>
</div>
</body>
</html>
