<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="Cache-Control" content="no-store">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Pramagent Dashboard</title>
  <script src="https://unpkg.com/htmx.org@1.9.10/dist/htmx.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f4f7fb;
      --panel: #ffffff;
      --panel-soft: #f8fafc;
      --text: #111827;
      --muted: #64748b;
      --border: #d9e2ec;
      --brand: #0f766e;
      --brand-dark: #0f4f4a;
      --danger-bg: #fee2e2;
      --danger-text: #991b1b;
      --ok-bg: #dcfce7;
      --ok-text: #166534;
      --warn-bg: #ffedd5;
      --warn-text: #9a3412;
      --info-bg: #e0f2fe;
      --info-text: #075985;
    }
    body {
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }
    .app-shell { display: grid; grid-template-columns: 244px 1fr; min-height: 100vh; }
    aside {
      background: #101827;
      color: #dbeafe;
      padding: 1rem;
      border-right: 1px solid #172033;
      position: sticky;
      top: 0;
      height: 100vh;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 0.65rem;
      padding: 0.4rem 0.35rem 1rem;
      border-bottom: 1px solid #233047;
      margin-bottom: 1rem;
    }
    .brand-mark {
      width: 34px;
      height: 34px;
      border-radius: 7px;
      display: grid;
      place-items: center;
      background: var(--brand);
      color: #ecfeff;
      font-weight: 800;
      letter-spacing: 0;
    }
    .brand-title { font-weight: 750; color: #f8fafc; line-height: 1.1; }
    .brand-sub { font-size: 0.72rem; color: #94a3b8; margin-top: 0.15rem; }
    nav { display: grid; gap: 0.35rem; }
    nav a {
      display: flex;
      align-items: center;
      height: 38px;
      padding: 0 0.65rem;
      border-radius: 6px;
      color: #cbd5e1;
      text-decoration: none;
      font-size: 0.9rem;
      border: 1px solid transparent;
    }
    nav a:hover { background: #182235; color: #ffffff; text-decoration: none; }
    .content { min-width: 0; }
    header {
      height: 64px;
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 1.4rem;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .scope { display: flex; align-items: center; gap: 0.6rem; color: var(--muted); font-size: 0.85rem; }
    .scope strong { color: var(--text); font-weight: 650; }
    .actions { display: flex; align-items: center; gap: 0.55rem; }
    main { max-width: 1380px; margin: 0 auto; padding: 1.4rem; }
    h1 { font-size: 1.45rem; font-weight: 750; margin-bottom: 1rem; color: #0f172a; letter-spacing: 0; }
    h2 { font-size: 1rem; font-weight: 700; margin-bottom: 0.75rem; color: #1e293b; letter-spacing: 0; }
    .grid { display: grid; gap: 1rem; }
    .grid-2 { grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); }
    .grid-3 { grid-template-columns: repeat(auto-fit, minmax(190px, 1fr)); }
    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1rem;
      box-shadow: 0 1px 2px rgba(15, 23, 42, 0.04);
      min-width: 0;
    }
    .stat-value { font-size: 1.9rem; line-height: 1.1; font-weight: 780; color: #0f172a; }
    .stat-label { font-size: 0.72rem; color: var(--muted); margin-top: 0.35rem; text-transform: uppercase; letter-spacing: 0.06em; }
    .badge { padding: 0.22em 0.55em; border-radius: 4px; font-size: 0.73rem; font-weight: 700; display: inline-flex; align-items: center; min-height: 22px; }
    .badge-ok { background: var(--ok-bg); color: var(--ok-text); }
    .badge-block { background: var(--danger-bg); color: var(--danger-text); }
    .badge-escalate { background: var(--warn-bg); color: var(--warn-text); }
    .badge-allow { background: var(--info-bg); color: var(--info-text); }
    .table-wrap { overflow-x: auto; border-radius: 8px; border: 1px solid var(--border); }
    table { width: 100%; border-collapse: collapse; font-size: 0.84rem; background: var(--panel); }
    th {
      text-align: left;
      padding: 0.62rem 0.75rem;
      color: #475569;
      font-weight: 700;
      border-bottom: 1px solid var(--border);
      background: var(--panel-soft);
      white-space: nowrap;
    }
    td { padding: 0.62rem 0.75rem; border-bottom: 1px solid #edf2f7; vertical-align: top; }
    tr:hover td { background: #f8fafc; }
    code, .mono { font-family: "Cascadia Code", "SFMono-Regular", Consolas, monospace; font-size: 0.78rem; }
    a { color: #0f766e; text-decoration: none; }
    a:hover { text-decoration: underline; }
    .btn {
      min-height: 34px;
      padding: 0.42rem 0.72rem;
      border-radius: 6px;
      font-size: 0.82rem;
      font-weight: 700;
      cursor: pointer;
      border: 1px solid transparent;
      background: #e2e8f0;
      color: #1f2937;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      white-space: nowrap;
    }
    .btn:hover { filter: brightness(0.98); text-decoration: none; }
    .btn-primary { background: var(--brand); color: #ffffff; }
    .btn-secondary { background: #ffffff; color: #334155; border-color: var(--border); }
    .btn-approve { background: #15803d; color: #ffffff; }
    .btn-deny { background: #b91c1c; color: #ffffff; }
    .filter-bar { display: flex; gap: 0.65rem; margin-bottom: 1rem; flex-wrap: wrap; align-items: center; }
    .filter-bar input, .filter-bar select, input {
      background: #ffffff;
      border: 1px solid #cbd5e1;
      color: #111827;
      min-height: 36px;
      padding: 0.42rem 0.65rem;
      border-radius: 6px;
      font-size: 0.86rem;
    }
    input:focus, select:focus { outline: 2px solid rgba(15, 118, 110, 0.18); border-color: var(--brand); }
    .empty { color: var(--muted); text-align: center; padding: 2rem; background: var(--panel-soft); border-radius: 8px; }
    .layer-row { display: flex; gap: 0.5rem; padding: 0.55rem 0; border-bottom: 1px solid #edf2f7; align-items: baseline; }
    .layer-name { font-family: "Cascadia Code", Consolas, monospace; font-size: 0.78rem; color: #334155; min-width: 200px; }
    .layer-detail { color: var(--muted); font-size: 0.8rem; }
    .latency { color: #94a3b8; font-size: 0.75rem; margin-left: auto; }
    .truncate { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 320px; }
    @media (max-width: 760px) {
      .app-shell { grid-template-columns: 1fr; }
      aside { position: static; height: auto; }
      nav { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      header { height: auto; min-height: 64px; align-items: flex-start; gap: 0.75rem; flex-direction: column; padding: 0.85rem 1rem; }
      main { padding: 1rem; }
      .actions { flex-wrap: wrap; }
    }
  </style>
  <script>
    window.addEventListener("pageshow", function (event) {
      if (event.persisted) {
        window.location.reload();
      }
    });
  </script>
</head>
<body>
<div class="app-shell">
  <aside>
    <div class="brand">
      <div class="brand-mark">P</div>
      <div>
        <div class="brand-title">Pramagent</div>
        <div class="brand-sub">Agent trust console</div>
      </div>
    </div>
    <nav aria-label="Dashboard navigation">
      <a href="/">Overview</a>
      <a href="/traces">Traces</a>
      <a href="/approvals">Approvals</a>
      <a href="/metrics">Metrics</a>
      <a href="/usage">Usage</a>
    </nav>
  </aside>
  <div class="content">
    <header>
      <div class="scope">
        {% if user is defined %}<span>User <strong>{{ user }}</strong></span>{% endif %}
        {% if tenant is defined %}<span>Tenant <strong>{{ tenant }}</strong></span>{% endif %}
      </div>
      <div class="actions">
        <a class="btn btn-secondary" href="/export/traces.csv">Export CSV</a>
        <form method="post" action="/logout">
          <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
          <button class="btn btn-primary" type="submit">Sign out</button>
        </form>
      </div>
    </header>
    <main>
      {% block content %}{% endblock %}
    </main>
  </div>
</div>
</body>
</html>
