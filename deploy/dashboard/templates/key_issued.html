<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="Cache-Control" content="no-store">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Pramagent - Dashboard key</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f4f7fb; color: #111827; display: grid; place-items: center; min-height: 100vh; padding: 1rem; }
    .card { background: #ffffff; border: 1px solid #d9e2ec; border-radius: 8px; box-shadow: 0 18px 45px rgba(15, 23, 42, 0.10); width: min(620px, 100%); padding: 1.5rem; }
    .brand { display: flex; align-items: center; gap: 0.7rem; margin-bottom: 1.25rem; }
    .brand-mark { width: 38px; height: 38px; border-radius: 7px; display: grid; place-items: center; background: #0f766e; color: #ffffff; font-weight: 800; }
    h1 { font-size: 1.25rem; font-weight: 760; letter-spacing: 0; }
    .sub { color: #64748b; font-size: 0.86rem; margin-top: 0.15rem; }
    .key {
      background: #0f172a;
      color: #ecfeff;
      border-radius: 8px;
      padding: 1rem;
      font-family: "Cascadia Code", "SFMono-Regular", Consolas, monospace;
      font-size: clamp(0.78rem, 2vw, 1rem);
      line-height: 1.55;
      word-break: break-all;
      user-select: all;
      margin: 1rem 0;
      border: 1px solid #1e293b;
    }
    .warning { background: #ffedd5; color: #9a3412; padding: 0.75rem 0.85rem; border-radius: 6px; font-size: 0.86rem; border: 1px solid #fed7aa; line-height: 1.45; }
    .note { color: #64748b; font-size: 0.82rem; margin-top: 0.85rem; line-height: 1.45; }
    .actions { display: flex; gap: 0.6rem; flex-wrap: wrap; margin-top: 1rem; }
    a, button { color: #0f766e; }
    .btn { display: inline-flex; align-items: center; justify-content: center; min-height: 38px; padding: 0.45rem 0.8rem; border-radius: 6px; border: 1px solid #d9e2ec; background: #ffffff; color: #334155; text-decoration: none; font-weight: 750; cursor: pointer; }
    .btn-primary { background: #0f766e; color: #ffffff; border-color: #0f766e; }
    code { font-family: "Cascadia Code", Consolas, monospace; font-size: 0.8rem; }
  </style>
</head>
<body>
<div class="card">
  <div class="brand">
    <div class="brand-mark">P</div>
    <div>
      <h1>{{ title }}</h1>
      <div class="sub">{{ identity }} · tenant {{ tenant }}</div>
    </div>
  </div>
  <div class="warning">{{ message }}</div>
  <div class="key" id="dashboard-key">{{ dashboard_key }}</div>
  <div class="note">Use this key with your email or phone on the sign-in page. The database stores only a bcrypt hash, so Pramagent cannot recover this value later.</div>
  <div class="actions">
    <button class="btn" type="button" onclick="navigator.clipboard.writeText(document.getElementById('dashboard-key').innerText)">Copy key</button>
    <a class="btn btn-primary" href="{{ login_url }}">Go to sign in</a>
  </div>
</div>
</body>
</html>
