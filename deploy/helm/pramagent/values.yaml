replicaCount: 3
image:
  repository: pramagent
  tag: "0.7.3"
  pullPolicy: IfNotPresent
# Hardened pod defaults (P3-13/T2-9): non-root, read-only root FS, no
# privilege escalation, all capabilities dropped. A writable emptyDir is
# mounted at /tmp for scratch space.
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1001
  seccompProfile:
    type: RuntimeDefault
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop: ["ALL"]
podDisruptionBudget:
  enabled: true
  minAvailable: 2
service:
  type: ClusterIP
  port: 8080
env:
  PRAMAGENT_LOG_LEVEL: info
  PRAMAGENT_RATE_LIMIT_CAPACITY: "100"
  PRAMAGENT_RATE_LIMIT_REFILL: "10"
# Secrets (PRAMAGENT_API_KEY, PRAMAGENT_JWT_SECRET, PRAMAGENT_REDIS_URL, PRAMAGENT_POSTGRES_DSN) come from
# an existing Kubernetes Secret named below.
# PRAMAGENT_POSTGRES_DSN is REQUIRED: the API refuses to start without a
# persistent store (PRAMAGENT_POSTGRES_DSN > PRAMAGENT_DB > explicit
# PRAMAGENT_ALLOW_MEMORY_STORE=1 dev opt-in). With replicaCount > 1 only the
# Postgres DSN gives all replicas one shared trace set and one audit chain.
existingSecret: pramagent-secrets
postgres:
  enabled: true
  dsnSecretKey: PRAMAGENT_POSTGRES_DSN
redis:
  enabled: true
  urlSecretKey: PRAMAGENT_REDIS_URL
resources:
  requests: { cpu: 100m, memory: 256Mi }
  limits:   { cpu: "1",  memory: 512Mi }
autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
otel:
  endpoint: ""   # e.g. http://otel-collector:4317
