apiVersion: v1
kind: Service
metadata:
  name: {{ include "veritrace.fullname" . }}
  labels: {{- include "veritrace.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.port }}
      protocol: TCP
  selector: {{- include "veritrace.selectorLabels" . | nindent 4 }}
