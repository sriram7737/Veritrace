# Pramagent - pilot docker-compose
# ─────────────────────────────────────────────────────────────────────────────
# Services:
#   postgres  - audit store + hash chain persistence
#   redis     - HITL signalling, rate-limit buckets, session memory
#   api       - Pramagent FastAPI sidecar (trust pipeline)
#   dashboard - lightweight admin UI (trace browser, approvals, metrics)
#
# Quick start:
#   cp .env.example .env   # fill in secrets
#   docker compose up -d
#   open http://localhost:8080/docs       # OpenAPI
#   open http://localhost:8501/          # Dashboard
# ─────────────────────────────────────────────────────────────────────────────

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:

  # ── Postgres ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-pramagent}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-pramagent}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./deploy/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    # internal-only: never published to the host (P1-10/T2-9)
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pramagent} -d ${POSTGRES_DB:-pramagent}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    mem_limit: 512m
    cpus: 1.0
    logging: *default-logging

  # ── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    environment:
      # consumed by the healthcheck inside the container ($$REDIS_PASSWORD)
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
    volumes:
      - redis_data:/data
    # internal-only: never published to the host (P1-10/T2-9)
    expose:
      - "6379"
    healthcheck:
      # $$ defers expansion to the container shell so the password is read
      # from the environment at run time, not baked into the inspectable
      # healthcheck command line
      test: ["CMD-SHELL", "redis-cli --no-auth-warning -a \"$$REDIS_PASSWORD\" ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
    mem_limit: 384m
    cpus: 0.5
    logging: *default-logging

  # ── Pramagent API ──────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      PRAMAGENT_HOST: "0.0.0.0"
      PRAMAGENT_PORT: "8080"
      PRAMAGENT_LOG_LEVEL: ${PRAMAGENT_LOG_LEVEL:-info}
      PRAMAGENT_REDIS_URL: "redis://:${REDIS_PASSWORD}@redis:6379/0"
      # Store priority: PRAMAGENT_POSTGRES_DSN > PRAMAGENT_DB > opt-in memory.
      # The API refuses to start without one of the three (P0-1), so this DSN
      # is what makes the stack actually persist traces + the audit chain.
      PRAMAGENT_POSTGRES_DSN: "postgresql://${POSTGRES_USER:-pramagent}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-pramagent}"
      PRAMAGENT_API_KEY: ${PRAMAGENT_API_KEY:?PRAMAGENT_API_KEY is required}
      PRAMAGENT_API_KEYS: "default:${PRAMAGENT_API_KEY}"
      PRAMAGENT_SIGNING_KEY: ${PRAMAGENT_SIGNING_KEY:?PRAMAGENT_SIGNING_KEY is required}
      PRAMAGENT_JWT_SECRET: ${PRAMAGENT_JWT_SECRET:?PRAMAGENT_JWT_SECRET is required}
      PRAMAGENT_MAX_INPUT_BYTES: ${PRAMAGENT_MAX_INPUT_BYTES:-65536}
      PRAMAGENT_RATE_LIMIT_CAPACITY: ${PRAMAGENT_RATE_LIMIT_CAPACITY:-100}
      PRAMAGENT_RATE_LIMIT_REFILL: ${PRAMAGENT_RATE_LIMIT_REFILL:-10}
      PRAMAGENT_RATE_BURST: ${PRAMAGENT_RATE_LIMIT_CAPACITY:-100}
      PRAMAGENT_RATE_PER_SEC: ${PRAMAGENT_RATE_LIMIT_REFILL:-10}
      PRAMAGENT_QUOTA_CALLS: ${PRAMAGENT_QUOTA_CALLS:-}
      PRAMAGENT_QUOTA_TOOL_VALIDATIONS: ${PRAMAGENT_QUOTA_TOOL_VALIDATIONS:-}
      PRAMAGENT_QUOTA_COST_USD: ${PRAMAGENT_QUOTA_COST_USD:-}
      PRAMAGENT_QUOTA_WINDOW_S: ${PRAMAGENT_QUOTA_WINDOW_S:-86400}
      PRAMAGENT_BILLING_WEBHOOK_URL: ${PRAMAGENT_BILLING_WEBHOOK_URL:-}
      PRAMAGENT_BILLING_WEBHOOK_SECRET: ${PRAMAGENT_BILLING_WEBHOOK_SECRET:-}
      PRAMAGENT_BILLING_WEBHOOK_TIMEOUT_S: ${PRAMAGENT_BILLING_WEBHOOK_TIMEOUT_S:-2.0}
      PRAMAGENT_HITL_SLACK_TOKEN: ${PRAMAGENT_HITL_SLACK_TOKEN:-}
      PRAMAGENT_HITL_SLACK_CHANNEL: ${PRAMAGENT_HITL_SLACK_CHANNEL:-}
      PRAMAGENT_OTEL_ENDPOINT: ${PRAMAGENT_OTEL_ENDPOINT:-}
    ports:
      - "${API_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
    mem_limit: 1g
    cpus: 1.0
    logging: *default-logging

  # ── Dashboard ──────────────────────────────────────────────────────────────
  dashboard:
    build:
      context: .
      dockerfile: deploy/dashboard/Dockerfile
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    environment:
      PRAMAGENT_API_URL: "http://api:8080"
      PRAMAGENT_API_KEY: ${PRAMAGENT_API_KEY}
      PRAMAGENT_DASHBOARD_REDIS_URL: "redis://:${REDIS_PASSWORD}@redis:6379/1"
      PRAMAGENT_DASHBOARD_KEY: ${PRAMAGENT_DASHBOARD_KEY:?PRAMAGENT_DASHBOARD_KEY is required}
      PRAMAGENT_JWT_SECRET: ${PRAMAGENT_JWT_SECRET:?PRAMAGENT_JWT_SECRET is required}
      PRAMAGENT_DASHBOARD_TENANT: ${PRAMAGENT_DASHBOARD_TENANT:-default}
      PRAMAGENT_DASHBOARD_ALLOW_SUPER_ADMIN: ${PRAMAGENT_DASHBOARD_ALLOW_SUPER_ADMIN:-false}
      PRAMAGENT_DASHBOARD_SECURE_COOKIE: ${PRAMAGENT_DASHBOARD_SECURE_COOKIE:-false}
      DASHBOARD_PORT: ${DASHBOARD_PORT:-8501}
    ports:
      - "${DASHBOARD_PORT:-8501}:8501"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    mem_limit: 512m
    cpus: 0.5
    logging: *default-logging

volumes:
  postgres_data:
  redis_data:
